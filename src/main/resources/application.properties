spring.application.name=datn

# --- CƠ SỞ DỮ LIỆU ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- BẢO MẬT JWT & ĐIỀU HƯỚNG ---
jwt.signerKey=${JWT_SECRET}
jwt.refreshTokenExpiration=604800000
jwt.accessTokenExpiration=30000000
frontend.url=${FRONTEND_URL}

# --- CẤU HÌNH GỬI EMAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.from=${MAIL_FROM}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- CẤU HÌNH REDIS & LETTUCE POOL ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=10
spring.data.redis.lettuce.pool.max-wait=-1ms

# --- BẬT JDBC BATCHING ---
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# --- CẤU HÌNH OAUTH2 (GOOGLE & AZURE) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
# --- CẤU HÌNH OAUTH2 (AZURE) ---
# --- Thông tin đăng ký Client ---
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email,User.Read
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# --- Thông tin cấu hình Provider của Azure ---
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=name


app.admin.password=${ADMIN_PASSWORD}

server.tomcat.threads.max=150
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=1000
server.tomcat.connection-timeout=20000

# --- Cấu hình HikariCP Connection Pool ---
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
server.forward-headers-strategy=framework
# --- VNPay Config ---

# application.properties
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.returnUrl=${VNPAY_RETURN_URL}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.version=2.1.0
vnpay.command=pay
app.tuition.cost-per-credit=450000

# --- Cấu hình Gemini ---
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}
logging.level.root=WARN
logging.level.com.example.datn=WARN

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
rabbitmq.queue.name=${RABBITMQ_QUEUE}
rabbitmq.exchange.name=${RABBITMQ_EXCHANGE}
rabbitmq.routing.name=${RABBITMQ_ROUTING_KEY}

# --- Cấu hình RabbitMQ Listener Concurrency ---
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=8
spring.rabbitmq.listener.simple.prefetch=50

